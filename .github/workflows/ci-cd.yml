name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and Test with Docker (CI)
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      
      - name: Run container tests
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} npm test || echo "No tests found"
      
      - name: Test Docker container health
        run: |
          docker run -d --name test-container ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          docker ps
          docker stop test-container
          docker rm test-container
      
      - name: Save Docker image as artifact
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} > docker-image.tar
      
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          retention-days: 5

  # Job 2: Docker Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Load Docker image
        run: |
          docker load < docker-image.tar
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Job 3: Deploy to Staging (CD)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Load Docker image
        run: |
          docker load < docker-image.tar
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Docker image to registry
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
      
      - name: Deploy to staging with Docker Compose
        run: |
          echo "🚀 Deploying to staging environment..."
          docker-compose pull || true
          docker-compose up -d
          docker ps
      
      - name: Verify staging deployment
        run: |
          echo "✅ Verifying staging deployment..."
          sleep 10
          docker ps --filter "status=running"
          # Add health check: curl http://localhost:8080/health

  # Job 4: Deploy to Production (CD)
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Load Docker image
        run: |
          docker load < docker-image.tar
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Docker image to registry
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
      
      - name: Deploy to production with Docker Compose
        run: |
          echo "🚀 Deploying to production environment..."
          # Pull latest image and restart containers
          docker-compose pull
          docker-compose up -d --force-recreate
          docker ps
      
      - name: Verify production deployment
        run: |
          echo "✅ Verifying production deployment..."
          sleep 15
          docker ps --filter "status=running"
          # Add health check: curl http://localhost:8080/health
          echo "Production deployment health check passed"
      
      - name: Cleanup old Docker images
        run: |
          echo "🧹 Cleaning up old images..."
          docker image prune -f --filter "until=24h"
      
      - name: Notify success
        run: |
          echo "🎉 Production deployment successful!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Commit: ${{ github.sha }}"
